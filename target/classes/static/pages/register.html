<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CineBook</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/index.html">
                <i class="bi bi-camera-reels-fill text-danger me-2"></i>CineBook
            </a>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-danger fs-1"></i>
                    <h3 class="text-white mt-2 mb-1">Create Account</h3>
                    <p class="text-muted mb-0">Join CineBook today</p>
                </div>

                <div id="errorAlert" class="alert alert-danger d-none"></div>
                <div id="successAlert" class="alert alert-success d-none"></div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label" for="name">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="name" placeholder="John Doe" required minlength="2">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="email">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="phone">Phone Number <span class="text-muted small">(optional)</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                            <input type="tel" class="form-control" id="phone" placeholder="+91 9999999999">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="Minimum 6 characters" required minlength="6">
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 py-2" id="registerBtn">
                        <span id="registerSpinner" class="spinner-border spinner-border-sm d-none me-2"></span>
                        <i class="bi bi-person-check me-2"></i>Create Account
                    </button>
                </form>

                <hr class="border-secondary my-4">
                <div class="text-center">
                    <p class="text-light">Already have an account?
                        <a href="/pages/login.html" class="text-danger fw-semibold">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="toast" class="toast">
            <div class="toast-header bg-danger text-white"><strong class="me-auto">CineBook</strong><button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button></div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        if (isLoggedIn()) window.location.href = '/index.html';

        document.getElementById('togglePassword').addEventListener('click', () => {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('#togglePassword i');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            icon.className = pwd.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const spinner = document.getElementById('registerSpinner');
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            btn.disabled = true;
            spinner.classList.remove('d-none');
            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({ name: data.name, email: data.email, role: data.role, id: data.userId }));
                    successAlert.textContent = 'Account created successfully! Redirecting...';
                    successAlert.classList.remove('d-none');
                    setTimeout(() => window.location.href = '/pages/dashboard.html', 1500);
                } else {
                    const msg = data.errors ? Object.values(data.errors).join(', ') : (data.message || 'Registration failed');
                    errorAlert.textContent = msg;
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                errorAlert.textContent = 'Connection error. Please try again.';
                errorAlert.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                spinner.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
