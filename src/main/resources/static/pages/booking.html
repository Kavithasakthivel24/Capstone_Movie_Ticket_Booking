<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Book Seats - CineBook</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="/css/style.css">

    <style>

        body{
            background:#0a0a0a;
            color:white;
        }

        .seat{
            width:45px;
            height:45px;
            border:none;
            border-radius:8px;
            margin:5px;
            font-size:12px;
            font-weight:bold;
            cursor:pointer;
            transition:0.2s;
        }

        .seat.available{
            background:#198754;
            color:white;
        }

        .seat.booked{
            background:#6c757d;
            cursor:not-allowed;
        }

        .seat.selected{
            background:#dc3545;
            transform:scale(1.1);
        }

        .screen{
            background:white;
            color:black;
            padding:10px;
            border-radius:10px;
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a href="/index.html"
           class="navbar-brand">

            CineBook

        </a>

    </div>

</nav>

<div class="container py-5">

    <h2 class="mb-4">

        <i class="bi bi-ticket-fill text-danger me-2"></i>

        Select Seats

    </h2>

    <div class="screen">

        SCREEN

    </div>

    <div id="seatsContainer"
         class="text-center">

        <div class="spinner-border text-danger"></div>

    </div>

    <div class="mt-5">

        <h4>

            Selected Seats:
            <span id="selectedSeatsText">None</span>

        </h4>

        <h5 class="mt-3">

            Total:
            ₹<span id="totalAmount">0</span>

        </h5>

        <button class="btn btn-danger btn-lg mt-4"
                onclick="confirmBooking()">

            Confirm Booking

        </button>

    </div>

</div>

<script src="/js/auth.js"></script>

<script>

    const params =
        new URLSearchParams(window.location.search);

    const showId =
        params.get('showId');

    let selectedSeats = [];

    let allSeats = [];

    async function loadSeats() {

        try {

            const res = await fetch(
                `/api/seats/show/${showId}`
            );

            if(!res.ok){

                throw new Error('Failed to fetch seats');
            }

            const seats = await res.json();

            allSeats = seats;

            const container =
                document.getElementById('seatsContainer');

            if(seats.length === 0){

                container.innerHTML = `
                    <p class="text-danger">
                        No seats found
                    </p>
                `;

                return;
            }

            container.innerHTML = seats.map(seat => `

                <button

                    class="seat
                    ${seat.status === 'AVAILABLE'
                        ? 'available'
                        : 'booked'}"

                    ${seat.status !== 'AVAILABLE'
                        ? 'disabled'
                        : ''}

                    onclick="toggleSeat(
                        ${seat.id},
                        '${seat.seatNumber}',
                        ${seat.price},
                        this
                    )"

                >

                    ${seat.seatNumber}

                </button>

            `).join('');

        } catch(err){

            console.error(err);

            document.getElementById(
                'seatsContainer'
            ).innerHTML = `

                <p class="text-danger">

                    Failed to load seats

                </p>

            `;
        }
    }

    function toggleSeat(id, number, price, btn){

        const existing =
            selectedSeats.find(s => s.id === id);

        if(existing){

            selectedSeats =
                selectedSeats.filter(s => s.id !== id);

            btn.classList.remove('selected');

        } else {

            selectedSeats.push({
                id,
                number,
                price
            });

            btn.classList.add('selected');
        }

        updateSummary();
    }

    function updateSummary(){

        document.getElementById(
            'selectedSeatsText'
        ).textContent =

            selectedSeats.length

            ?

            selectedSeats
                .map(s => s.number)
                .join(', ')

            :

            'None';

        const total =
            selectedSeats.reduce(
                (sum, s) => sum + s.price,
                0
            );

        document.getElementById(
            'totalAmount'
        ).textContent = total;
    }

    async function confirmBooking(){

        if(selectedSeats.length === 0){

            alert('Please select seats');

            return;
        }

        const token =
            localStorage.getItem('token');

        if(!token){

            alert('Please login first');

            window.location.href =
                '/pages/login.html';

            return;
        }

        const body = {

            showId: parseInt(showId),

            seatIds:
                selectedSeats.map(s => s.id),

            paymentMethod: "CREDIT_CARD"
        };

        try {

            const res = await fetch(
                '/api/bookings',
                {
                    method: 'POST',

                    headers: {

                        'Content-Type':
                            'application/json',

                        'Authorization':
                            'Bearer ' + token
                    },

                    body: JSON.stringify(body)
                }
            );

            if(!res.ok){

                const errText =
                    await res.text();

                console.error(errText);

                alert('Booking failed');

                return;
            }

            const booking =
                await res.json();

            alert(

                'Booking Successful!\n\n'

                +

                'Booking ID: '

                +

                booking.bookingId
            );

            window.location.href =
                '/pages/dashboard.html';

        } catch(err){

            console.error(err);

            alert('Error creating booking');
        }
    }

    loadSeats();

</script>

</body>
</html>
