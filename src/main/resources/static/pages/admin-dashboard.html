<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CineBook</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow">

    <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold" href="/index.html">
            <i class="bi bi-camera-reels-fill text-danger me-2"></i>
            CineBook
            <span class="badge bg-danger ms-2 small">ADMIN</span>
        </a>

        <div class="d-flex align-items-center gap-3">

            <i class="bi bi-person-circle text-light"></i>

            <span class="text-light fw-500" id="userName"></span>

            <button class="btn btn-outline-danger btn-sm"
                    onclick="logout()">

                <i class="bi bi-box-arrow-right me-1"></i>
                Logout

            </button>

        </div>

    </div>

</nav>

<div style="padding-top: 80px;
            background-color: #0a0a0a;
            min-height: 100vh;">

    <div class="container-fluid px-4 py-4">

        <!-- NAVIGATION -->

        <ul class="nav nav-tabs mb-4">

            <li class="nav-item">
                <a class="nav-link active"
                   href="#"
                   onclick="showTab('dashboard', this); return false;">

                    <i class="bi bi-speedometer2 me-1"></i>
                    Dashboard

                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link"
                   href="#"
                   onclick="showTab('users', this); return false;">

                    <i class="bi bi-people me-1"></i>
                    Users

                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link"
                   href="#"
                   onclick="showTab('movies', this); return false;">

                    <i class="bi bi-film me-1"></i>
                    Movies

                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link"
                   href="#"
                   onclick="showTab('shows', this); return false;">

                    <i class="bi bi-calendar-event me-1"></i>
                    Shows

                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link"
                   href="#"
                   onclick="showTab('bookings', this); return false;">

                    <i class="bi bi-ticket me-1"></i>
                    Bookings

                </a>
            </li>

        </ul>

        <!-- DASHBOARD -->

        <div id="tab-dashboard">

            <div class="row g-4 mb-4"
                 id="statsContainer">

                <div class="col-12 text-center py-4">

                    <div class="spinner-border text-danger"></div>

                </div>

            </div>

        </div>

        <!-- USERS -->

        <div id="tab-users" style="display:none">

            <h5 class="text-white fw-bold mb-3">
                <i class="bi bi-people me-2 text-danger"></i>
                All Users
            </h5>

            <div id="usersTable"></div>

        </div>

        <!-- MOVIES -->

        <div id="tab-movies" style="display:none">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h5 class="text-white fw-bold mb-0">

                    <i class="bi bi-film me-2 text-danger"></i>
                    Manage Movies

                </h5>

                <button class="btn btn-danger btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#addMovieModal">

                    <i class="bi bi-plus-lg me-1"></i>
                    Add Movie

                </button>

            </div>

            <div id="moviesTable"></div>

        </div>

        <!-- SHOWS -->

        <div id="tab-shows" style="display:none">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h5 class="text-white fw-bold mb-0">

                    <i class="bi bi-calendar-event me-2 text-danger"></i>
                    Manage Shows

                </h5>

                <button class="btn btn-danger btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#addShowModal">

                    <i class="bi bi-plus-lg me-1"></i>
                    Add Show

                </button>

            </div>

            <div id="showsTable"></div>

        </div>

        <!-- BOOKINGS -->

        <div id="tab-bookings" style="display:none">

            <h5 class="text-white fw-bold mb-3">

                <i class="bi bi-ticket me-2 text-danger"></i>
                All Bookings

            </h5>

            <div id="bookingsTable"></div>

        </div>

    </div>

</div>

<!-- ADD MOVIE MODAL -->

<div class="modal fade"
     id="addMovieModal"
     tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content"
             style="background:#181818;
                    border:1px solid #3a3a3a;">

            <div class="modal-header"
                 style="border-bottom:1px solid #3a3a3a;">

                <h5 class="modal-title text-white">

                    Add Movie

                </h5>

                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <form id="addMovieForm">

                    <div class="row g-3">

                        <div class="col-md-6">

                            <label class="form-label">Title</label>

                            <input type="text"
                                   class="form-control"
                                   id="movieTitle">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">Genre</label>

                            <input type="text"
                                   class="form-control"
                                   id="movieGenre">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">Language</label>

                            <input type="text"
                                   class="form-control"
                                   id="movieLanguage">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">Duration</label>

                            <input type="number"
                                   class="form-control"
                                   id="movieDuration">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">Rating</label>

                            <input type="number"
                                   class="form-control"
                                   step="0.1"
                                   id="movieRating">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">Release Date</label>

                            <input type="date"
                                   class="form-control"
                                   id="movieReleaseDate">

                        </div>

                        <div class="col-12">

                            <label class="form-label">Poster URL</label>

                            <input type="text"
                                   class="form-control"
                                   id="moviePosterUrl">

                        </div>

                        <div class="col-12">

                            <label class="form-label">Description</label>

                            <textarea class="form-control"
                                      rows="3"
                                      id="movieDescription"></textarea>

                        </div>

                    </div>

                </form>

            </div>

            <div class="modal-footer">

                <button class="btn btn-danger"
                        onclick="addMovie()">

                    Add Movie

                </button>

            </div>

        </div>

    </div>

</div>

<!-- ADD SHOW MODAL -->

<div class="modal fade"
     id="addShowModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content"
             style="background:#181818;
                    border:1px solid #3a3a3a;">

            <div class="modal-header">

                <h5 class="modal-title text-white">

                    Add Show

                </h5>

                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label class="form-label">Movie ID</label>

                    <input type="number"
                           id="showMovieId"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Theater ID</label>

                    <input type="number"
                           id="showTheaterId"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Screen ID</label>

                    <input type="number"
                           id="showScreenId"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Show Date</label>

                    <input type="date"
                           id="showDate"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Start Time</label>

                    <input type="time"
                           id="startTime"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">End Time</label>

                    <input type="time"
                           id="endTime"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Ticket Price</label>

                    <input type="number"
                           id="ticketPrice"
                           class="form-control">

                </div>

            </div>

            <div class="modal-footer">

                <button class="btn btn-danger"
                        onclick="addShow()">

                    Add Show

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/auth.js"></script>

<script>

if (!isLoggedIn() || !isAdmin()) {
    window.location.href = '/pages/login.html';
}

const user = getUser();

if (user) {
    document.getElementById('userName').textContent = user.name;
}

/* =========================
   TAB SWITCHING
========================= */

function showTab(tabName, el) {

    document.querySelectorAll('[id^="tab-"]')
        .forEach(t => t.style.display = 'none');

    document.querySelectorAll('.nav-link')
        .forEach(l => l.classList.remove('active'));

    document.getElementById('tab-' + tabName)
        .style.display = 'block';

    el.classList.add('active');

    if (tabName === 'dashboard') {
        loadDashboard();
    }

    else if (tabName === 'users') {
        loadUsers();
    }

    else if (tabName === 'movies') {
        loadMoviesAdmin();
    }

    else if (tabName === 'shows') {
        loadShowsAdmin();
    }

    else if (tabName === 'bookings') {
        loadBookingsAdmin();
    }
}

/* =========================
   DASHBOARD
========================= */

async function loadDashboard() {

    try {

        const res = await apiRequest('/admin/dashboard');

        const data = await res.json();

        document.getElementById('statsContainer').innerHTML = `

            <div class="col-md-3">
                <div class="card bg-dark text-white border-danger p-3">
                    <h3>${data.totalUsers || 0}</h3>
                    <p>Total Users</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card bg-dark text-white border-danger p-3">
                    <h3>${data.totalMovies || 0}</h3>
                    <p>Total Movies</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card bg-dark text-white border-danger p-3">
                    <h3>${data.totalBookings || 0}</h3>
                    <p>Total Bookings</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card bg-dark text-white border-danger p-3">
                    <h3>₹${data.totalRevenue || 0}</h3>
                    <p>Total Revenue</p>
                </div>
            </div>

        `;

    } catch (err) {

        document.getElementById('statsContainer').innerHTML =
            '<p class="text-danger">Failed to load dashboard</p>';

        console.error(err);
    }
}

/* =========================
   USERS
========================= */

async function loadUsers() {

    try {

        const res = await apiRequest('/admin/users');

        const users = await res.json();

        document.getElementById('usersTable').innerHTML = `

            <table class="table table-dark table-bordered">

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>

                </thead>

                <tbody>

                    ${users.map(user => `

                        <tr>

                            <td>${user.id}</td>

                            <td>${user.name}</td>

                            <td>${user.email}</td>

                            <td>${user.role}</td>

                        </tr>

                    `).join('')}

                </tbody>

            </table>

        `;

    } catch (err) {

        document.getElementById('usersTable').innerHTML =
            '<p class="text-danger">Failed to load users</p>';

        console.error(err);
    }
}

/* =========================
   MOVIES
========================= */

async function loadMoviesAdmin() {

    try {

        const res = await fetch('/api/movies');

        const movies = await res.json();

        document.getElementById('moviesTable').innerHTML = `

            <table class="table table-dark">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Title</th>
                        <th>Genre</th>

                    </tr>

                </thead>

                <tbody>

                    ${movies.content.map(movie => `

                        <tr>

                            <td>${movie.id}</td>

                            <td>${movie.title}</td>

                            <td>${movie.genre}</td>

                        </tr>

                    `).join('')}

                </tbody>

            </table>

        `;

    } catch (err) {

        document.getElementById('moviesTable').innerHTML =
            '<p class="text-danger">Failed to load movies</p>';

        console.error(err);
    }
}

/* =========================
   SHOWS
========================= */

async function loadShowsAdmin() {

    try {

        const res = await apiRequest('/shows');

        const shows = await res.json();

        document.getElementById('showsTable').innerHTML = `

            <table class="table table-dark">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Movie</th>
                        <th>Theater</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Seats</th>

                    </tr>

                </thead>

                <tbody>

                    ${shows.map(show => `

                        <tr>

                            <td>${show.id}</td>

                            <td>${show.movieTitle}</td>

                            <td>${show.theaterName}</td>

                            <td>${show.showDate}</td>

                            <td>${show.startTime}</td>

                            <td>
                                ${show.availableSeats}
                                /
                                ${show.totalSeats}
                            </td>

                        </tr>

                    `).join('')}

                </tbody>

            </table>

        `;

    } catch (err) {

        document.getElementById('showsTable').innerHTML =
            '<p class="text-danger">Failed to load shows</p>';

        console.error(err);
    }
}

/* =========================
   BOOKINGS
========================= */

async function loadBookingsAdmin() {

    try {

        const res = await apiRequest('/admin/bookings');

        const bookings = await res.json();

        document.getElementById('bookingsTable').innerHTML = `

            <table class="table table-dark table-bordered">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>User</th>
                        <th>Movie</th>
                        <th>Seats</th>
                        <th>Amount</th>

                    </tr>

                </thead>

                <tbody>

                    ${bookings.map(booking => `

                        <tr>

                            <td>${booking.id}</td>

                            <td>${booking.userName}</td>

                            <td>${booking.movieTitle}</td>

                            <td>${booking.seatNumbers}</td>

                            <td>₹${booking.totalAmount}</td>

                        </tr>

                    `).join('')}

                </tbody>

            </table>

        `;

    } catch (err) {

        document.getElementById('bookingsTable').innerHTML =
            '<p class="text-danger">Failed to load bookings</p>';

        console.error(err);
    }
}

/* =========================
   ADD MOVIE
========================= */

async function addMovie() {

    const body = {

        title:
            document.getElementById('movieTitle').value,

        genre:
            document.getElementById('movieGenre').value,

        language:
            document.getElementById('movieLanguage').value,

        duration:
            parseInt(document.getElementById('movieDuration').value),

        rating:
            parseFloat(document.getElementById('movieRating').value),

        releaseDate:
            document.getElementById('movieReleaseDate').value,

        posterUrl:
            document.getElementById('moviePosterUrl').value,

        description:
            document.getElementById('movieDescription').value

    };

    try {

        const res = await apiRequest('/movies', {

            method: 'POST',

            body: JSON.stringify(body)

        });

        if (res.ok) {

            alert('Movie added');

            loadMoviesAdmin();

        } else {

            alert('Failed to add movie');
        }

    } catch (err) {

        alert('Error adding movie');

        console.error(err);
    }
}

/* =========================
   ADD SHOW
========================= */

async function addShow() {

    const body = {

        movieId: parseInt(
            document.getElementById('showMovieId').value
        ),

        theaterId: parseInt(
            document.getElementById('showTheaterId').value
        ),

        screenId: parseInt(
            document.getElementById('showScreenId').value
        ),

        showDate:
            document.getElementById('showDate').value,

        startTime:
            document.getElementById('startTime').value,

        endTime:
            document.getElementById('endTime').value,

        ticketPrice: parseFloat(
            document.getElementById('ticketPrice').value
        )

    };

    try {

        const res = await apiRequest('/shows', {

            method: 'POST',

            body: JSON.stringify(body)

        });

        if (res.ok) {

            alert('Show added successfully');

            bootstrap.Modal.getInstance(
                document.getElementById('addShowModal')
            ).hide();

            loadShowsAdmin();

        } else {

            alert('Failed to add show');
        }

    } catch (err) {

        alert('Error adding show');

        console.error(err);
    }
}

/* =========================
   INITIAL LOAD
========================= */

loadDashboard();

</script>

</body>
</html>
